<div class="plant-dashboard-widget" id="sazeracShiftWidget">
  <style>
    .plant-dashboard-widget {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff;
      border: 1px solid #d1d9e6;
      border-radius: 4px;
      max-width: 420px;
      margin: 10px auto;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .widget-header {
      background: linear-gradient(135deg, #003865 0%, #005a9e 100%);
      color: #fff;
      padding: 12px 16px;
    }

    .brand-sub {
      font-size: 0.7rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.85;
    }

    .next-shift-banner {
      font-size: 0.95rem;
      font-weight: 700;
      margin-top: 2px;
    }

    .scroll-container { padding: 14px; background: #f5f7fb; }

    .period-label {
      font-size: 0.72rem;
      font-weight: 900;
      color: #003865;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid #d1d9e6;
    }

    /* Flat card list replacing scroll wheel */
    .shift-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }

    .shift-card {
      background: #fff;
      border: 1px solid #d1d9e6;
      border-left: 4px solid #d1d9e6;
      border-radius: 4px;
      padding: 10px 12px;
      cursor: pointer;
      transition: box-shadow 0.15s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .shift-card.active {
      border-left-color: #003865;
      box-shadow: 0 2px 8px rgba(0,56,101,0.12);
    }

    .shift-card.night.active  { border-left-color: #3949ab; }
    .shift-card.day.active    { border-left-color: #b28900; }
    .shift-card.standby.active{ border-left-color: #546e7a; }

    .sc-left { flex: 1; }
    .sc-date { font-weight: 700; font-size: 0.85rem; color: #222; }
    .sc-time { font-size: 0.78rem; color: #555; margin-top: 2px; }

    .shift-badge {
      font-size: 0.68rem;
      font-weight: 900;
      padding: 3px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      white-space: nowrap;
    }

    .night  .shift-badge { background: #3949ab; color: #fff; }
    .day    .shift-badge { background: #b28900; color: #fff; }
    .standby .shift-badge { background: #546e7a; color: #fff; }

    /* Detail panel */
    .shift-details {
      background: #fff;
      border: 1px solid #d1d9e6;
      border-radius: 4px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 6px 8px;
      font-size: 0.82rem;
    }

    .d-label {
      font-weight: 900;
      font-size: 0.7rem;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding-top: 2px;
    }

    .d-value { color: #222; line-height: 1.3; }

    .tag {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 3px;
      background: #eef2ff;
      color: #243b7a;
    }

    .tag.attn { background: #fff8e1; color: #7a5a00; }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-sm {
      padding: 10px;
      font-size: 0.75rem;
      font-weight: 900;
      text-align: center;
      text-decoration: none;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      display: block;
    }

    .btn-fill    { background: #003865; color: #fff !important; }
    .btn-outline { border: 1px solid #003865; color: #003865 !important; background: transparent; }
  </style>

  <div class="widget-header">
    <div class="brand-sub">Sazerac · Shift & Time</div>
    <div class="next-shift-banner" id="currentShiftBanner">Select a shift</div>
  </div>

  <div class="scroll-container">
    <div class="period-label">Pay period: Feb 08 – Feb 21, 2026</div>

    <!-- Flat shift cards - no scroll wheel -->
    <div class="shift-list" id="shiftList">
      <div class="shift-card night active" data-shift="0">
        <div class="sc-left">
          <div class="sc-date">Wednesday, Feb 11</div>
          <div class="sc-time">19:00 – 07:00</div>
        </div>
        <span class="shift-badge">Night</span>
      </div>

      <div class="shift-card day" data-shift="1">
        <div class="sc-left">
          <div class="sc-date">Friday, Feb 13</div>
          <div class="sc-time">07:00 – 19:00</div>
        </div>
        <span class="shift-badge">Day</span>
      </div>

      <div class="shift-card standby" data-shift="2">
        <div class="sc-left">
          <div class="sc-date">Sunday, Feb 15</div>
          <div class="sc-time">07:00 – 19:00</div>
        </div>
        <span class="shift-badge">Standby</span>
      </div>

      <div class="shift-card night" data-shift="3">
        <div class="sc-left">
          <div class="sc-date">Monday, Feb 16</div>
          <div class="sc-time">19:00 – 07:00</div>
        </div>
        <span class="shift-badge">Night</span>
      </div>
    </div>

    <!-- Detail Panel -->
    <div class="shift-details" id="shiftDetails"></div>

    <div class="action-row">
      <a href="#" class="btn-sm btn-fill">Clock In / Out</a>
      <a href="#" class="btn-sm btn-outline">My Timecard</a>
    </div>
    <div class="action-row" style="margin-top:8px;">
      <a href="#" class="btn-sm btn-fill">Report Issue</a>
      <a href="#" class="btn-sm btn-outline">Safety & Quality</a>
    </div>
  </div>

  <script>
    (function () {
      const shifts = [
        { date: "Wednesday, Feb 11", time: "19:00 – 07:00", area: "Bottling · Line 3", role: "Packaging Operator", status: "Not clocked in", tag: "Night shift premium applies", tagClass: "" },
        { date: "Friday, Feb 13",    time: "07:00 – 19:00", area: "Warehouse · Shipping", role: "Forklift Operator", status: "Scheduled", tag: null, tagClass: "" },
        { date: "Sunday, Feb 15",    time: "07:00 – 19:00", area: "Maintenance", role: "Standby (if called in)", status: "Supervisor on duty", tag: "Be ready if called in", tagClass: "attn" },
        { date: "Monday, Feb 16",    time: "19:00 – 07:00", area: "Quality · Finished Goods", role: "Quality Technician", status: "Scheduled", tag: null, tagClass: "" }
      ];

      const banner  = document.getElementById('currentShiftBanner');
      const details = document.getElementById('shiftDetails');
      const cards   = document.querySelectorAll('.shift-card');

      function showShift(index) {
        const s = shifts[index];
        cards.forEach(c => c.classList.remove('active'));
        cards[index].classList.add('active');
        banner.textContent = `${s.date} · ${s.time}`;
        details.innerHTML = `
          <div class="detail-grid">
            <span class="d-label">Area</span><span class="d-value">${s.area}</span>
            <span class="d-label">Role</span><span class="d-value">${s.role}</span>
            <span class="d-label">Status</span><span class="d-value">${s.status}</span>
          </div>
          ${s.tag ? `<div><span class="tag ${s.tagClass}">${s.tag}</span></div>` : ''}
        `;
      }

      cards.forEach(card => {
        card.addEventListener('click', function () {
          showShift(parseInt(this.dataset.shift));
        });
      });

      showShift(0);
    })();
  </script>
</div>
