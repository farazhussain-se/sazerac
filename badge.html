<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sazerac Badge Widget</title>
  <style>
    body {
      margin: 0;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      color: #333;
    }
    .badge {
      background: white;
      border-radius: 20px;
      padding: 20px;
      max-width: 280px;
      width: 100%;
      box-shadow: 0 12px 32px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
    }
    .badge::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #d4af37, #b8860b, #daa520);
    }
    .sazerac-header {
      text-align: center;
      margin-bottom: 12px;
      font-size: 16px;
      font-weight: 700;
      color: #8b4513;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .user-name {
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 18px;
      color: #4a2c0b;
      line-height: 1.2;
    }
    .badge-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: #666;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }
    .qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .qr-placeholder {
      width: 80px;
      height: 80px;
      background: 
        repeating-linear-gradient(0deg, #4a2c0b 0px, #4a2c0b 4px, #d4af37 4px, #d4af37 8px),
        repeating-linear-gradient(90deg, #4a2c0b 0px, #4a2c0b 4px, #d4af37 4px, #d4af37 8px),
        linear-gradient(45deg, rgba(212,175,55,0.3) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(212,175,55,0.3) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(212,175,55,0.3) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(212,175,55,0.3) 75%);
      background-size: 16px 16px, 16px 16px, 20px 20px, 20px 20px, 20px 20px, 20px 20px;
      border-radius: 8px;
      border: 2px solid #b8860b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #fff;
      font-weight: bold;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
    .qr-label {
      font-size: 11px;
      font-weight: 600;
      color: #8b4513;
    }
    .loading {
      text-align: center;
      color: rgba(255,255,255,0.9);
      font-size: 16px;
      padding: 20px;
    }
    @media (max-width: 320px) {
      .badge {
        margin: 0 8px;
        padding: 16px;
      }
      .user-name {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div id="app" class="badge loading">Loading Sazerac Badge...</div>

  <script>
    // Access Staffbase user info via query param (passed by Embedder with plugin)
    const urlParams = new URLSearchParams(window.location.search);
    const jwt = urlParams.get('jwt');
    
    // Mock user data for standalone testing; replace with real API call if JWT available
    let userName = 'John Doe (Demo User)';
    
    // If JWT present (in Staffbase), fetch real user info (example endpoint)
    if (jwt) {
      // Example: Fetch from your Sazerac backend that validates JWT and returns user
      // fetch(`https://your-sazerac-api.com/user?jwt=${encodeURIComponent(jwt)}`)
      //   .then(res => res.json())
      //   .then(data => {
      //     userName = `${data.firstName || ''} ${data.lastName || ''}`.trim() || 'Sazerac Team Member';
      //     renderBadge();
      //   })
      //   .catch(() => renderBadge()); // Fallback to mock
      console.log('JWT detected - ready for Sazerac backend integration');
    }
    
    function renderBadge() {
      const app = document.getElementById('app');
      const trimmedName = userName.trim() || 'Sazerac Team Member';
      app.innerHTML = `
        <div class="sazerac-header">SAZERAC</div>
        <div class="user-name">${trimmedName}</div>
        <div class="badge-footer">
          <span>Employee ID: ****</span>
          <div class="qr-section">
            <div class="qr-placeholder">QR</div>
            <span class="qr-label">Scan Me</span>
          </div>
        </div>
      `;
      // Auto-resize for embedder iframe height sync
      if (parent.postMessage) {
        const resizeObserver = new ResizeObserver(() => {
          parent.postMessage({ height: document.body.scrollHeight }, '*');
        });
        resizeObserver.observe(app);
      }
    }
    
    // Render immediately
    renderBadge();
    
    // Handle runtime vars from Embedder if needed (e.g., {userId})
    document.addEventListener('DOMContentLoaded', () => {
      // Could use {userId} for dynamic QR/Employee ID
    });
  </script>
</body>
</html>
