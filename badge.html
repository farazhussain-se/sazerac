<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sazerac Employee Badge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #8B4513 0%, #D2691E 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .badge {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      max-width: 320px;
      width: 100%;
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #654321 0%, #A0522D 100%);
      color: white;
      padding: 25px 20px;
      text-align: center;
    }
    .avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 4px solid white;
      margin: 0 auto 12px;
      display: block;
      background: #ccc;
      object-fit: cover;
    }
    .name { font-size: 1.4em; font-weight: bold; margin-bottom: 4px; }
    .position { font-size: 0.95em; opacity: 0.85; margin-bottom: 2px; }
    .department { font-size: 0.85em; opacity: 0.75; }
    .qr-section {
      padding: 25px 20px;
      text-align: center;
      background: #f8f9fa;
    }
    .qr-label {
      font-size: 0.8em;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .qr-placeholder {
      width: 140px; height: 140px;
      margin: 0 auto;
      background: white;
      border: 2px solid #ddd;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qr-placeholder svg { width: 120px; height: 120px; }
    .footer {
      padding: 15px 20px;
      text-align: center;
      background: white;
      font-size: 0.8em;
      color: #999;
      border-top: 1px solid #eee;
    }
    .ext-id {
      font-family: monospace;
      font-size: 0.85em;
      color: #A0522D;
      font-weight: bold;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="badge">
    <div class="header">
      <img id="avatar" class="avatar" src="" alt="Avatar" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 80 80%22><circle cx=%2240%22 cy=%2230%22 r=%2220%22 fill=%22%23ccc%22/><ellipse cx=%2240%22 cy=%2270%22 rx=%2230%22 ry=%2220%22 fill=%22%23ccc%22/></svg>'">
      <div class="name" id="name">—</div>
      <div class="position" id="position">—</div>
      <div class="department" id="department">—</div>
      <div class="ext-id" id="extId">—</div>
    </div>
    <div class="qr-section">
      <div class="qr-label">Employee ID · Scan to Verify</div>
      <div class="qr-placeholder">
        <!-- Static QR placeholder SVG pattern -->
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- Top-left finder -->
          <rect x="5" y="5" width="30" height="30" fill="none" stroke="#1a1a1a" stroke-width="4"/>
          <rect x="12" y="12" width="16" height="16" fill="#1a1a1a"/>
          <!-- Top-right finder -->
          <rect x="65" y="5" width="30" height="30" fill="none" stroke="#1a1a1a" stroke-width="4"/>
          <rect x="72" y="12" width="16" height="16" fill="#1a1a1a"/>
          <!-- Bottom-left finder -->
          <rect x="5" y="65" width="30" height="30" fill="none" stroke="#1a1a1a" stroke-width="4"/>
          <rect x="12" y="72" width="16" height="16" fill="#1a1a1a"/>
          <!-- Data dots -->
          <rect x="42" y="5" width="6" height="6" fill="#1a1a1a"/>
          <rect x="50" y="5" width="6" height="6" fill="#1a1a1a"/>
          <rect x="42" y="13" width="6" height="6" fill="#1a1a1a"/>
          <rect x="58" y="13" width="6" height="6" fill="#1a1a1a"/>
          <rect x="50" y="21" width="6" height="6" fill="#1a1a1a"/>
          <rect x="42" y="42" width="6" height="6" fill="#1a1a1a"/>
          <rect x="50" y="42" width="6" height="6" fill="#1a1a1a"/>
          <rect x="58" y="42" width="6" height="6" fill="#1a1a1a"/>
          <rect x="42" y="50" width="6" height="6" fill="#1a1a1a"/>
          <rect x="58" y="50" width="6" height="6" fill="#1a1a1a"/>
          <rect x="42" y="58" width="6" height="6" fill="#1a1a1a"/>
          <rect x="50" y="58" width="6" height="6" fill="#1a1a1a"/>
          <rect x="65" y="42" width="6" height="6" fill="#1a1a1a"/>
          <rect x="73" y="42" width="6" height="6" fill="#1a1a1a"/>
          <rect x="81" y="42" width="6" height="6" fill="#1a1a1a"/>
          <rect x="65" y="58" width="6" height="6" fill="#1a1a1a"/>
          <rect x="81" y="58" width="6" height="6" fill="#1a1a1a"/>
          <rect x="5" y="42" width="6" height="6" fill="#1a1a1a"/>
          <rect x="13" y="42" width="6" height="6" fill="#1a1a1a"/>
          <rect x="21" y="50" width="6" height="6" fill="#1a1a1a"/>
          <rect x="5" y="58" width="6" height="6" fill="#1a1a1a"/>
          <rect x="65" y="65" width="6" height="6" fill="#1a1a1a"/>
          <rect x="73" y="73" width="6" height="6" fill="#1a1a1a"/>
          <rect x="81" y="81" width="6" height="6" fill="#1a1a1a"/>
          <rect x="73" y="81" width="6" height="6" fill="#1a1a1a"/>
          <rect x="81" y="73" width="6" height="6" fill="#1a1a1a"/>
        </svg>
      </div>
    </div>
    <div class="footer">
      Sazerac Company · <span id="location">—</span>
    </div>
  </div>

  <script>
    // Staffbase Custom Widget SDK - exact method per developer docs
    // https://developers.staffbase.com/tutorials/display-user-info-in-customwidget/

    function renderBadge(user) {
      if (!user) return;
      document.getElementById('name').textContent =
        `${user.firstName || ''} ${user.lastName || ''}`.trim() || '—';
      document.getElementById('position').textContent = user.position || '—';
      document.getElementById('department').textContent = user.department || '—';
      document.getElementById('extId').textContent = user.externalId
        ? `EXT: ${user.externalId}`
        : user.id
        ? `ID: ${user.id}`
        : '—';
      document.getElementById('location').textContent = user.location || '—';
      if (user.avatar) {
        document.getElementById('avatar').src = user.avatar;
      }
    }

    // Staffbase SDK entry point
    if (window.staffbase && window.staffbase.widget) {
      const api = window.staffbase.widget;
      api.getUserInformation().then(function(user) {
        renderBadge(user);
      }).catch(function(err) {
        console.error('Staffbase getUserInformation error:', err);
      });
    } else {
      // Outside Staffbase (browser test) - listen for SDK injection
      document.addEventListener('staffbaseReady', function(e) {
        e.detail.getUserInformation().then(renderBadge);
      });
    }
  </script>
</body>
</html>
