<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sazerac Badge Widget</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      border: 2px solid #ccc;
      border-radius: 12px;
      background-color: white;
      max-width: 300px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .title {
      margin: 0 0 15px 0;
      color: #333;
      font-size: 18px;
    }
    .user-name {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      text-align: center;
      color: #222;
    }
    .qr-placeholder {
      width: 120px;
      height: 120px;
      background: 
        linear-gradient(45deg, #ddd 25%, transparent 25%), 
        linear-gradient(-45deg, #ddd 25%, transparent 25%), 
        linear-gradient(45deg, transparent 75%, #ddd 75%), 
        linear-gradient(-45deg, transparent 75%, #ddd 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      border: 1px solid #ddd;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #999;
      font-weight: bold;
    }
    .loading {
      padding: 20px;
      text-align: center;
      color: #666;
    }
  </style>
</head>
<body>
  <div id="app" class="badge loading">Loading Sazerac badge...</div>

  <script>
    // Access Staffbase user info via query param (passed by Embedder with plugin)
    const urlParams = new URLSearchParams(window.location.search);
    const jwt = urlParams.get('jwt');
    
    // Mock user data for standalone testing; replace with real API call if JWT available
    let userName = 'John Doe (Demo User)';
    
    // If JWT present (in Staffbase), fetch real user info (example endpoint)
    if (jwt) {
      // Example: Fetch from your backend that validates JWT and returns user
      // fetch(`https://your-sazerac-api.com/user?jwt=${encodeURIComponent(jwt)}`)
      //   .then(res => res.json())
      //   .then(data => {
      //     userName = `${data.firstName} ${data.lastName}`;
      //     renderBadge();
      //   })
      //   .catch(() => renderBadge()); // Fallback
      console.log('JWT detected; integrate with Sazerac backend for real user data');
      // For simulation, use mock
    }
    
    function renderBadge() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <h3 class="title">Sazerac Badge</h3>
        <div class="user-name">${userName}</div>
        <div class="qr-placeholder">QR Code<br>(Stand-in)</div>
      `;
    }
    
    // Render immediately (demo) or after fetch
    renderBadge();
  </script>
</body>
</html>
