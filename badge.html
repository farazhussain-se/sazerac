<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sazerac Employee Badge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: linear-gradient(135deg, #8B4513 0%, #D2691E 100%); 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 20px; 
    }
    .badge { 
      background: white; 
      border-radius: 20px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
      max-width: 320px; 
      width: 100%; 
      overflow: hidden; 
    }
    .header { 
      background: linear-gradient(135deg, #654321 0%, #A0522D 100%); 
      color: white; 
      padding: 25px 20px; 
      text-align: center; 
    }
    .avatar { 
      width: 70px; height: 70px; 
      border-radius: 50%; 
      border: 4px solid white; 
      margin: 0 auto 12px; 
      background: linear-gradient(135deg, #ddd, #eee); 
    }
    .name { 
      font-size: 1.5em; 
      font-weight: bold; 
      margin-bottom: 4px; 
      word-break: break-word; 
    }
    .id { 
      font-size: 1.1em; 
      opacity: 0.9; 
      font-family: monospace; 
    }
    .qr-section { 
      padding: 25px 20px; 
      background: #f8f9fa; 
      text-align: center; 
    }
    #qr-code { 
      width: 140px; height: 140px; 
      margin: 0 auto 15px; 
      background: #fff; 
      border: 2px solid #ddd; 
      border-radius: 8px; 
      display: flex; align-items: center; justify-content: center; 
      font-size: 10px; color: #999; 
    }
    .qr-label { 
      font-size: 0.85em; 
      color: #666; 
      text-transform: uppercase; 
      letter-spacing: 0.5px; 
      margin-bottom: 8px; 
    }
    .footer { 
      padding: 20px; 
      text-align: center; 
      background: #f1f3f4; 
      font-size: 0.9em; 
      color: #666; 
    }
    @media (max-width: 400px) { 
      .badge { margin: 10px; border-radius: 16px; }
      .header { padding: 20px 15px; }
      .qr-section { padding: 20px 15px; }
    }
  </style>
</head>
<body>
  <div class="badge" id="badge">
    <div class="header">
      <div class="avatar" id="avatar"></div>
      <div class="name" id="name">Loading...</div>
      <div class="id" id="identifier">ID: Loading...</div>
    </div>
    <div class="qr-section">
      <div class="qr-label">Scan for Profile</div>
      <canvas id="qr-code"></canvas>
    </div>
    <div class="footer">
      Sazerac Company • Buffalo Trace Distillery
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    // Staffbase Custom Widget API - No hardcoded data
    window.addEventListener('message', function(event) {
      if (event.data.type === 'userData') {
        const user = event.data.user || {};
        populateBadge(user);
      }
    });

    function populateBadge(user) {
      // Name
      const fullName = `${user.firstName || ''} ${user.lastName || ''}`.trim() || 'Sazerac Employee';
      document.getElementById('name').textContent = fullName;
      
      // Identifier (employee ID, username, or fallback)
      const id = user.id || user.username || user.email?.split('@')[0] || 'EMP-0000';
      document.getElementById('identifier').textContent = `ID: ${id}`;
      
      // Avatar (platform avatar URL or fallback gradient)
      const avatar = document.getElementById('avatar');
      if (user.avatar) {
        avatar.style.background = 'none';
        avatar.innerHTML = `<img src="${user.avatar}" alt="${fullName}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
      } else {
        avatar.innerHTML = '';
        const hue = Math.floor(Math.random() * 60) + 300; // Brown/orange tones
        avatar.style.background = `linear-gradient(135deg, hsl(${hue}, 40%, 60%), hsl(${hue}, 40%, 70%))`;
      }
      
      // QR Code - Encodes user ID for profile lookup
      const qrCanvas = document.getElementById('qr-code');
      QRCode.toCanvas(qrCanvas, id, {
        width: 130,
        margin: 1,
        color: { dark: '#1a1a1a', light: '#fff' }
      }, function(error) {
        if (error) console.error('QR Error:', error);
      });
    }

    // Auto-load current user for preview
    setTimeout(() => {
      window.parent.postMessage({ type: 'requestUserData' }, '*');
    }, 100);
  </script>
</body>
</html>
